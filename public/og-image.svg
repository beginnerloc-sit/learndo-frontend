<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1c3a10"/>
      <stop offset="100%" stop-color="#3a6a20"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f3ecdc"/>
    </linearGradient>
    <linearGradient id="leaf1" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6f9a5f"/>
      <stop offset="100%" stop-color="#3e6534"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative bg circles -->
  <circle cx="1050" cy="80"  r="180" fill="#ffffff" opacity="0.04"/>
  <circle cx="1120" cy="560" r="140" fill="#ffffff" opacity="0.04"/>
  <circle cx="80"   cy="500" r="100" fill="#ffffff" opacity="0.03"/>

  <!-- Grid of tiny leaf dots -->
  <g opacity="0.12" fill="#9cc47b">
    <circle cx="60"  cy="60"  r="4"/><circle cx="120" cy="60"  r="4"/><circle cx="180" cy="60"  r="4"/>
    <circle cx="60"  cy="120" r="4"/><circle cx="120" cy="120" r="4"/><circle cx="180" cy="120" r="4"/>
    <circle cx="1020" cy="510" r="4"/><circle cx="1080" cy="510" r="4"/><circle cx="1140" cy="510" r="4"/>
    <circle cx="1020" cy="570" r="4"/><circle cx="1080" cy="570" r="4"/><circle cx="1140" cy="570" r="4"/>
  </g>

  <!-- Main card -->
  <rect x="64" y="64" width="740" height="502" rx="36" fill="url(#card-bg)" opacity="0.97"/>
  <rect x="64" y="64" width="740" height="502" rx="36" fill="none" stroke="#5a3e1a" stroke-width="3"/>
  <!-- card drop shadow hint -->
  <rect x="72" y="74" width="740" height="502" rx="36" fill="#3e2410" opacity="0.18"/>
  <rect x="64" y="64" width="740" height="502" rx="36" fill="url(#card-bg)" opacity="0.97"/>
  <rect x="64" y="64" width="740" height="502" rx="36" fill="none" stroke="#5a3e1a" stroke-width="3"/>

  <!-- Plant icon (logo-mark embedded, scaled to ~110px, centered vertically left of title) -->
  <g transform="translate(104, 148) scale(1.7)">
    <path d="M16 42 L48 42 L44 56 Q44 58 42 58 L22 58 Q20 58 20 56 Z" fill="#b89a73"/>
    <path d="M16 40 L48 40 L48 44 L16 44 Z" fill="#936e44"/>
    <path d="M32 42 Q31 30 32 18" stroke="#3e6534" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M32 28 Q20 24 16 12 Q26 14 32 22 Z" fill="#527e44"/>
    <path d="M32 28 Q20 24 16 12" stroke="#3e6534" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M32 22 Q44 16 50 6 Q42 22 34 26 Z" fill="#6f9a5f"/>
    <path d="M32 22 Q44 16 50 6" stroke="#3e6534" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
    <circle cx="32" cy="16" r="2.5" fill="#f3c14a"/>
  </g>

  <!-- "Learndo" title -->
  <text x="210" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="bold" fill="#1c2c19" letter-spacing="-2">Learndo</text>

  <!-- Accent underline -->
  <rect x="210" y="286" width="430" height="5" rx="3" fill="#5a9333" opacity="0.7"/>

  <!-- Tagline -->
  <text x="210" y="348" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#527e44" font-weight="600">Grow your vocabulary, one word</text>
  <text x="210" y="392" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#527e44" font-weight="600">at a time 🌱</text>

  <!-- Divider -->
  <rect x="104" y="448" width="660" height="2" rx="1" fill="#d6c7a3" opacity="0.6"/>

  <!-- Description -->
  <text x="104" y="490" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#6e4e2c">Plant words, water them daily, harvest fluency.</text>

  <!-- Decorative right-side plants -->
  <!-- Big leaf right -->
  <g transform="translate(870, 80)">
    <ellipse cx="0" cy="0" rx="110" ry="55" fill="#3e6534" opacity="0.85" transform="rotate(-30)"/>
    <line x1="0" y1="0" x2="-70" y2="38" stroke="#2b4a24" stroke-width="2.5" opacity="0.6"/>
    <line x1="-20" y1="-8" x2="-65" y2="15" stroke="#2b4a24" stroke-width="1.5" opacity="0.4"/>
    <line x1="-40" y1="8" x2="-75" y2="28" stroke="#2b4a24" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Medium leaf right-bottom -->
  <g transform="translate(980, 480)">
    <ellipse cx="0" cy="0" rx="80" ry="38" fill="#527e44" opacity="0.8" transform="rotate(20)"/>
    <line x1="0" y1="0" x2="55" y2="-22" stroke="#3e6534" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Small accent leaf -->
  <g transform="translate(900, 300)">
    <ellipse cx="0" cy="0" rx="50" ry="24" fill="#6f9a5f" opacity="0.6" transform="rotate(-50)"/>
  </g>
  <!-- Flower dots scattered -->
  <circle cx="1050" cy="200" r="10" fill="#f3c14a" opacity="0.9"/>
  <circle cx="1090" cy="340" r="7"  fill="#e87aa3" opacity="0.8"/>
  <circle cx="870"  cy="420" r="8"  fill="#f3c14a" opacity="0.7"/>
  <circle cx="1140" cy="150" r="6"  fill="#9cc47b" opacity="0.8"/>

  <!-- Bottom brand strip -->
  <rect x="0" y="594" width="1200" height="36" fill="#1c2c19" opacity="0.55"/>
  <text x="600" y="618" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#fffbe9" text-anchor="middle" opacity="0.85" letter-spacing="1">🌸  learndo.app  ·  Language learning garden</text>
</svg>
